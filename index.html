        p {
            text-align: center;
            font-size: 18px;
        }

        label {
            font-weight: bold;
            margin-top: 15px;
            color: #024A85;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .btn-custom {
            margin-top: 25px;
            padding: 10px;
            border-radius: 12px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg" style="background-color: #8cb7dac5;">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <img src="https://images.squarespace-cdn.com/content/v1/664c7ae50eea9c731b37e817/e01fd0f1-eda0-443b-ab56-74f748469f01/Header.png" height="70" alt="obmclogo">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                <span class="navbar-toggler-icon"></span>

        <div class="collapse navbar-collapse" id="mynavbar">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
            </form>
        </div>
        </div>
    </nav>
    <br><br>
    <div id="formbox">
        <h1>Login Page</h1>
        <p>Log in to your OBMC Account</p>
        <form>
            <label>Username</label>
                <input id="username" type="text" placeholder="Enter username">

            <label>Password</label>
                <input id="password" type="password" placeholder="Enter password">
            <div class="form-check" style="margin-top:15px;">
                <input class="form-check-input" id="stayLogged" type="checkbox" value="">
                <label class="form-check-label" for="stayLogged">Stay logged in</label>
            </div>
            <button type="button" class="btn btn-success w-100 btn-custom" onclick="validateLogin()">Log in</button>
             <button type="reset" class="btn btn-danger w-100 btn-custom">Reset</button>
        </form>
    </div>

<script>
    function validateLogin() {
        const name = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        if (!name || !password) {
            if (!name && !password) {
                alert("Please fill in username and password.");
            } else if (!name) {
                alert("Please fill in username.");
            } else {
                alert("Please fill in password.");
            }
            return;
        }

        if (name === "RennSantosPogi" && password === "GiveBonusPoints") {
            alert("Logged in!");
        } else {
            alert("Incorrect username/password!");
        }
    }
</script>
    



<br><br>
